<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNES Games - By Della</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-effects">
        <div class="scanlines"></div>
    </div>

    <header class="top-bar">
        <div class="logo-container">
            <span class="logo-nintendo">Nintendo</span>
            <div class="logo-main">
                <div class="logo-snes-dots">
                    <span class="dot green"></span>
                    <span class="dot blue"></span>
                    <span class="dot yellow"></span>
                    <span class="dot red"></span>
                </div>
                <h1>SUPER NINTENDO</h1>
            </div>
            <p class="logo-sub">ENTERTAINMENT SYSTEM</p>
        </div>
        <div class="divider-line"></div>
    </header>

    <main class="game-area">
        <div id="game-grid" class="game-grid"></div>
    </main>

    <footer class="bottom-bar">
        <div class="divider-line bottom-line"></div>
        <div class="controls-guide">
            <span><kbd>MOUSE / SETAS (PC)</kbd> NAVEGAR</span>
            <span><kbd>ENTER / CLIQUE</kbd> JOGAR</span>
            <span><kbd>🕹️ GAMEPAD/JOYSTICK</kbd> ATIVA SOMENTE DENTRO DO JOGO</span>
            <span><kbd>ESC</kbd> SAIR DO JOGO</span>
        </div>
    </footer>

    <div id="emulator-modal" class="hidden">
        <div style="width:100%;height:100%;max-width:100%">
            <div id="game"></div>
        </div>
    </div>

    <!-- EmulatorJS Scripts -->
    <script>
        EJS_player = '#game';
        EJS_core = 'snes';
        // EJS_gameUrl will be set dynamically in script.js
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_startOnLoaded = true; // Inicia o jogo direto, pulando o botão azul
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
