<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNES Nostalgia</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="background-effects"></div>
    <div class="scanlines"></div>

    <header class="top-bar">
        <div class="logo-container">
            <div class="logo-main">
                <img src="assets/logo/snes.png" alt="SNES Logo" class="logo-snes-img">
                <h1>SUPER NINTENDO</h1>
            </div>
            <p class="logo-sub">ENTERTAINMENT SYSTEM</p>
        </div>
        <div class="divider-line"></div>
    </header>

    <main class="game-area">
        <div id="game-grid" class="game-grid"></div>
    </main>

    <footer class="bottom-bar">
        <div class="divider-line bottom-line"></div>
        <div class="controls-guide">
            <span><kbd class="key-yellow">MOUSE / SETAS</kbd> NAVEGAR</span>
            <span><kbd class="key-green">ENTER / CLIQUE</kbd> JOGAR</span>
            <span><kbd class="key-blue">GAMEPAD</kbd> ATIVA NO JOGO</span>
            <span><kbd class="key-red">ESC</kbd> SAIR DO JOGO</span>
            <a href="saves.html" style="text-decoration: none; color: inherit;">
                <span style="cursor: pointer; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.7" onmouseout="this.style.opacity=1"><kbd class="key-saves">SAVES</kbd> ENTENDA COMO FUNCIONAM</span>
            </a>
        </div>
    </footer>

    <div id="emulator-modal" class="hidden">
        <div style="width:100%;height:100%;max-width:100%">
            <div id="game"></div>
        </div>
    </div>

    <!-- EmulatorJS Scripts -->
    <script>
        EJS_player = '#game';
        EJS_core = 'snes';
        // EJS_gameUrl will be set dynamically in script.js
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
        EJS_startOnLoaded = true; // Inicia o jogo direto, pulando o botão azul
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
    
    <script src="script.js?v=2"></script>
</body>
</html>
